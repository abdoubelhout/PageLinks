<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Links</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #f0ede8;
      --sub: rgba(240,237,232,0.5);
      --accent1: #e8c97e;
      --accent2: #c96f6f;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(232,201,126,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(201,111,111,0.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 420px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    /* Avatar */
    .avatar-wrap {
      position: relative;
      margin-bottom: 6px;
      animation: fadeDown 0.7s ease both;
    }
    .avatar {
      width: 110px;
      height: 110px;
   
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--bg);
      letter-spacing: -1px;
      box-shadow: 0 0 0 3px var(--bg), 0 0 0 5px rgba(232,201,126,0.3);
    }

    img{
      width : 90px ;
      height : 90px ;
    }
    /* Replace the letter below with your initials or an <img> tag */

    .name {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      text-align: center;
      animation: fadeDown 0.7s 0.1s ease both;
    }

    .bio {
      color: var(--sub);
      font-size: 0.9rem;
      font-weight: 300;
      text-align: center;
      line-height: 1.6;
      max-width: 300px;
      animation: fadeDown 0.7s 0.2s ease both;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      border-radius: 2px;
      margin: 4px 0 10px;
      animation: fadeDown 0.7s 0.25s ease both;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 22px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.25s, border-color 0.25s, transform 0.2s;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }

    .link-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 60%, rgba(255,255,255,0.03));
      pointer-events: none;
    }

    .link-btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.18);
      transform: translateY(-2px);
    }

    .link-btn:active { transform: translateY(0); }

    .icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.25rem;
    }

    .icon-instagram { background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); }
    .icon-facebook  { background: #1877f2; }
    .icon-web1      { background: linear-gradient(135deg, #0f9b8e, #0f62fe); }
    .icon-web2      { background: linear-gradient(135deg, #8e44ad, #3498db); }

    .link-info { display: flex; flex-direction: column; gap: 2px; flex: 1; }
    .link-label {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--sub);
    }
    .link-title { font-size: 1rem; font-weight: 500; }

    .arrow {
      color: var(--sub);
      font-size: 1.1rem;
      transition: transform 0.2s, color 0.2s;
    }
    .link-btn:hover .arrow { transform: translateX(3px); color: var(--accent1); }

    /* Stagger animation */
    .link-btn:nth-child(1) { animation: fadeUp 0.6s 0.3s ease both; }
    .link-btn:nth-child(2) { animation: fadeUp 0.6s 0.42s ease both; }
    .link-btn:nth-child(3) { animation: fadeUp 0.6s 0.54s ease both; }
    .link-btn:nth-child(4) { animation: fadeUp 0.6s 0.66s ease both; }

    /* Footer */
    .footer {
      font-size: 0.72rem;
      color: rgba(240,237,232,0.2);
      margin-top: 12px;
      animation: fadeUp 0.6s 0.8s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
